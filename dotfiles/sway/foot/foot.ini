# Foot terminal configuration - DWM color scheme

# Colors come from the active theme (thememenu swaps the current-theme symlink).
# `include=` must precede every [section] header — foot only honors it at the
# top level, otherwise it's parsed as a key inside the most recent section.
include=~/.config/sway/current-theme/foot-colors.ini

[main]
term = xterm-256color
font = JetBrainsMono Nerd Font Mono:size=20
dpi-aware = no
pad = 8x8

[bell]
urgent = yes
notify = yes

[scrollback]
lines = 10000

[url]
launch = xdg-open ${url}

[cursor]
style = block
blink = no

[mouse]
hide-when-typing = yes

[csd]
preferred = none
