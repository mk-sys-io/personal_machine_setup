# === LAUNCH ===

# App launcher
bindsym $mod+space exec $menu

# Terminal
bindsym $mod+Return exec $term

# Show keybindings help
bindsym $mod+Shift+h exec $config_dir/scripts/help

# Theme switcher
bindsym $mod+Shift+t exec $config_dir/scripts/thememenu

# File manager (ranger)
bindsym $mod+f exec ranger

# Text editor
bindsym $mod+e exec zed

# === OUR CUSTOM LAUNCHERS ===

# Browser (Brave)
bindsym $mod+Shift+g exec ~/.config/waybar/scripts/launch-browser.sh

# Toggle clipboard history (cliphist via rofi)
bindsym $mod+v exec cliphist list | rofi -dmenu -config $config_dir/rofi/config.rasi | cliphist decode | wl-copy

# Clear all clipboard history
bindsym $mod+Shift+v exec ~/.config/waybar/scripts/clear-clipboard.sh

# System monitor (btop)
bindsym $mod+b exec kitty -e btop

# Toggle Wi-Fi panel
bindsym $mod+n exec ~/.config/waybar/scripts/toggle-nmtui.sh

# === WINDOW STATE ===

# Toggle floating
bindsym $mod+Shift+space floating toggle

# Toggle fullscreen
bindsym $mod+Shift+f fullscreen

# Cycle layout (split → tabbed → stacking)
bindsym $mod+t layout toggle split tabbed stacking

# Tabbed layout
bindsym $mod+w layout tabbed

# Cycle through tabs / siblings in current container
bindsym Mod1+Tab focus next sibling
bindsym Mod1+Shift+Tab focus prev sibling

floating_modifier $mod normal

# === WM CONTROL ===

# Reload sway
bindsym $mod+Shift+r reload

# Close window
bindsym $mod+q kill

# Power menu (shutdown/reboot)
bindsym $mod+x exec $config_dir/scripts/power

# Toggle notification center (swaync)
bindsym $mod+Shift+n exec swaync-client -t

# === WINDOW NAVIGATION ===

bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

# Move focused window
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

# === WINDOW RESIZE ===

bindsym $mod+Ctrl+Left resize shrink width 10px
bindsym $mod+Ctrl+Right resize grow width 10px
bindsym $mod+Ctrl+Up resize shrink height 10px
bindsym $mod+Ctrl+Down resize grow height 10px

# Balance windows
bindsym $mod+Ctrl+equal balance

# === SPLITS ===

# Horizontal split
bindsym $mod+h splith

# Vertical split
bindsym $mod+g splitv

# === MEDIA & BRIGHTNESS ===

bindsym XF86AudioRaiseVolume exec $config_dir/scripts/changevolume up
bindsym XF86AudioLowerVolume exec $config_dir/scripts/changevolume down
bindsym XF86AudioMute exec $config_dir/scripts/changevolume mute

# Volume control (custom bindings)
bindsym $mod+F12 exec $config_dir/scripts/changevolume up
bindsym $mod+F11 exec $config_dir/scripts/changevolume down
bindsym $mod+F10 exec $config_dir/scripts/changevolume mute

bindsym XF86MonBrightnessUp exec $config_dir/scripts/changebrightness up
bindsym XF86MonBrightnessDown exec $config_dir/scripts/changebrightness down

# === SCREENSHOTS ===

# Fullscreen screenshot
bindsym $mod+s exec $config_dir/scripts/screenshot full

# Region screenshot
bindsym $mod+Shift+s exec $config_dir/scripts/screenshot region

# === WORKSPACE NAVIGATION ===

# Cycle through existing workspaces
bindsym $mod+Escape workspace next_on_output

# Create and jump to next available workspace number
bindsym $mod+Ctrl+n exec swaymsg workspace number $(swaymsg -t get_workspaces -r | python3 -c "import sys,json; ws=[w['num'] for w in json.load(sys.stdin)]; print(max(ws)+1 if ws else 1)")
