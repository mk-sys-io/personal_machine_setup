meta:
  target_system: "Debian 13 (Minimal Netinstall) + Sway WM"
  desktop_environment_details: "No systemd-resolved, Wayland-native, Sway tiling WM"
  primary_browser: "Brave Browser (Chromium-based Engine)"
  clipboard_manager: "CopyQ (Monitored clipboard context)"
  architecture: "Zero-Sudo, Containerized Development, Network-Level & Browser Whitelist"
  execution_mode: "Sequential with Mandatory User Interactivity Hand-off"

CRITICAL_WARNING:
  - "DO NOT RUN THIS PLAYBOOK WITHOUT AN ACTIVE TIMESHIFT SNAPSHOT."
  - "Because this script alters kernel firewall states and completely drops administrative group assignments, any misconfiguration will result in a permanent system lock."

playbook:
  - phase: 0_prerequisites_and_backups
    steps:
      - step_1: Verify Timeshift is installed and functional.
        commands:
          - "sudo apt update && sudo apt install -y timeshift"

      - step_2: Create a pre-lockdown system restore point.
        commands:
          - "sudo timeshift --create --comments 'Pre-ZeroSudo-Lockdown'"

      - step_3: Install core system utilities, network diagnostic engines, and development environments.
        commands:
          - "sudo apt install -y curl wl-clipboard copyq xclip golang-go nftables"

      - step_4: Install the NextDNS CLI daemon.
        commands:
          - "sh -c 'mkdir -p /tmp/nextdns && cd /tmp/nextdns && curl -sL https://nextdns.io/install | sh'"
        note: "Configures nextdns to handle core resolution states natively as a background systemd service."

  - phase: 1_brave_browser_enterprise_lockdown
    steps:
      - step_1: Build the explicit managed policy directory trees required by the Chromium engine.
        commands:
          - "sudo mkdir -p /etc/chromium/policies/managed/"
          - "sudo mkdir -p /etc/opt/chrome/policies/managed/"
          - "sudo mkdir -p /etc/brave/policies/managed/"

      - step_2: Write the strict whitelist profile directly into Brave's policy path, isolating the NextDNS dashboard.
        target_file: "/etc/brave/policies/managed/policy.json"
        action: write_file
        content: |
          {
            "BuiltInDnsClientEnabled": false,
            "DnsOverHttpsMode": "secure",
            "DnsOverHttpsTemplates": "https://dns.nextdns.io/YOUR_NEXTDNS_ID",
            "URLBlocklist": [
              "*",
              "my.nextdns.io"
            ],
            "URLAllowlist": [
              "*.wikipedia.org",
              "*.github.com",
              "*.githubusercontent.com",
              "*.nextdns.io",
              "*.uopeople.edu",
              "accounts.google.com",
              "*.gstatic.com",
              "apis.google.com"
            ]
          }

      - step_3: Replicate the policy configuration across alternative Chromium paths to prevent system profile containment escapes.
        commands:
          - "sudo cp /etc/brave/policies/managed/policy.json /etc/chromium/policies/managed/policy.json"
          - "sudo cp /etc/brave/policies/managed/policy.json /etc/opt/chrome/policies/managed/policy.json"

      - step_4: Enforce deep Root ownership and strip write permissions from standard system users.
        commands:
          - "sudo chown -R root:root /etc/brave/ /etc/chromium/ /etc/opt/chrome/"
          - "sudo chmod -R 755 /etc/brave/ /etc/chromium/ /etc/opt/chrome/"

  - phase: 2_kernel_firewall_and_policykit_lockdown
    steps:
      - step_1: Extract NextDNS routing infrastructure endpoints.
        commands:
          - "nextdns status"

      - step_2: Compile and inject the localized netfilter architecture to intercept standard user bypass attempts.
        target_file: "/etc/nftables.conf"
        action: write_file
        content: |
          #!/usr/sbin/nft -f
          flush ruleset

          table inet filter {
              chain input {
                  type filter hook input priority filter; policy accept;
              }
              chain forward {
                  type filter hook forward priority filter; policy accept;
              }
              chain output {
                  type filter hook output priority filter; policy accept;

                  # Allow loopback (local workflows) and direct rootless container network adapters
                  oifname "lo" accept
                  oifname "cni+" accept
                  oifname "docker+" accept

                  # Contain standard user 'mike' (UID 1000) traffic strictly to assigned NextDNS instances
                  skuid 1000 tcp dport { 80, 443 } ip daddr != { YOUR_NEXTDNS_IP_1, YOUR_NEXTDNS_IP_2 } drop
                  skuid 1000 udp dport { 80, 443, 853 } ip daddr != { YOUR_NEXTDNS_IP_1, YOUR_NEXTDNS_IP_2 } drop
              }
          }

      - step_3: Commit ruleset to Linux kernel and enable persistent service tracking.
        commands:
          - "sudo systemctl enable --now nftables"

      - step_4: Patch the PolicyKit (PolKit) desktop escalation loophole to stop execution via pkexec.
        target_file: "/etc/polkit-1/localauthority/50-local.d/99-lockdown.pkla"
        action: write_file
        content: |
          [Block Mike Admin Actions]
          Identity=unix-user:mike
          Action=*
          ResultAny=no
          ResultInactive=no
          ResultActive=no

  - phase: 3_automated_environment_verification
    steps:
      - step_1: Assert local system network namespace skips browser policy definitions.
        commands:
          - "cat /etc/resolv.conf"

      - step_2: Ensure rootless development containers run unhindered.
        commands:
          - "podman run --rm alpine ping -c 2 github.com"
          - "docker run --rm alpine ping -c 2 github.com"

      - step_3: Build the decentralized Identity-Based Encryption toolchain.
        commands:
          - "go install github.com/drand/tlock/cmd/tle@latest"

  - phase: 4_manual_user_execution
    meta:
      instruction: "AI AUTOMATION BOUNDARY REACHED. The user must manually copy/paste and execute the following sequential terminal directives."
    steps:
      - manual_step_1: Initialize the local secure cache workspace directory.
        commands:
          - "mkdir -p ~/.config/vault"

      - manual_step_2: Generate high-entropy string, clear from terminal input buffer, and lock using the Drand Network protocol.
        commands:
          - "echo 'YOUR_GENERATED_SECURE_PASSWORD' | ~/go/bin/tle crypt --duration 48h > ~/.config/vault/root_password.tlock"
        note: "This encrypts your master string, rendering it completely un-decryptable for exactly 48 hours."

      - manual_step_3: Strip admin deployment configurations from the 'mike' user account.
        commands:
          - "sudo deluser mike sudo"
          - "sudo deluser mike adm"

      - manual_step_4: Commit password updates to kernel and shell space profiles.
        commands:
          - "sudo passwd root"
          - "sudo passwd mike"

      - manual_step_5: Clean runtime memory buffers, wipe CopyQ clipboard stack, and drop volatile command traces.
        commands:
          - "copyq clear"
          - "wl-copy --clear"
          - "history -c && rm -f ~/.bash_history ~/.zsh_history && exit"
